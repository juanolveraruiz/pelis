<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noches de películas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&family=Fascinate&family=Faster+One&family=Limelight&family=Nosifer&family=Notable&family=Sail&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Noches de películas 🍿</h1>
    </header>

    <main class="container">
        <div class="search-container">
            <input type="text" id="busqueda" placeholder="Buscar película o quién sugiere...">
        </div>
        <div id="movie-list" class="movie-grid"></div>
    </main>
    <div id="modal-pelicula" class="detalle-modal">
        <button class="btn-cerrar" onclick="cerrarDetalle()">✕</button>
        <div id="contenido-detalle"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
